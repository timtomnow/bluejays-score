<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Jays Score</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003087">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jays Score">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #003087;
      min-height: 100vh;
      padding: 16px 16px 40px;
      -webkit-font-smoothing: antialiased;
    }

    #app { max-width: 440px; margin: 0 auto; }

    /* ── Header ── */
    .header { text-align: center; padding: 20px 0 18px; }
    .logo-img { width: 68px; height: 68px; object-fit: contain; }
    .header h1 { color: #fff; font-size: 20px; font-weight: 700; margin-top: 8px; }
    .header .date { color: rgba(255,255,255,.55); font-size: 13px; margin-top: 3px; }

    /* ── Cards ── */
    .card { background: #fff; border-radius: 16px; overflow: hidden; margin-bottom: 12px; box-shadow: 0 2px 16px rgba(0,0,0,.22); }
    .sec { padding: 14px 16px; }
    .sec + .sec { border-top: 1px solid #f2f2f2; }
    .sec-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: #b0b0b0; margin-bottom: 10px; }

    /* ── Badges ── */
    .badge { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
    .b-live    { background: #ff3b30; color: #fff; }
    .b-final   { background: #e8e8ed; color: #555; }
    .b-preview { background: #34c759; color: #fff; }
    .b-off     { background: #e8e8ed; color: #666; }

    /* ── Score row ── */
    .score-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .score-row { display: flex; align-items: center; justify-content: space-between; }
    .team-col { flex: 1; text-align: center; }
    .team-abbr { font-size: 12px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
    .score-num { font-size: 50px; font-weight: 800; color: #1c1c1e; line-height: 1; }
    .score-num.dim { color: #ccc; }
    .score-num.hi  { color: #003087; }
    .score-dash { font-size: 30px; color: #ddd; font-weight: 300; padding: 0 6px; flex-shrink: 0; }
    .score-vs   { font-size: 16px; color: #ccc; padding: 0 12px; flex-shrink: 0; }
    .team-record { font-size: 11px; color: #c0c0c0; margin-top: 2px; }

    /* ── Situation (count / bases / outs) ── */
    .situation { display: flex; align-items: center; justify-content: space-around; padding: 4px 0; }
    .sit-col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .sit-label { font-size: 10px; color: #b0b0b0; text-transform: uppercase; letter-spacing: .4px; }

    .count-grid { display: flex; flex-direction: column; gap: 6px; }
    .count-row  { display: flex; align-items: center; gap: 5px; }
    .count-lbl  { font-size: 10px; color: #aaa; width: 10px; flex-shrink: 0; }
    .cdot { width: 11px; height: 11px; border-radius: 50%; border: 2px solid #e0e0e0; background: transparent; }
    .cdot.ball   { background: #30d158; border-color: #30d158; }
    .cdot.strike { background: #ff9f0a; border-color: #ff9f0a; }

    .out-dots { display: flex; gap: 7px; }
    .odot { width: 13px; height: 13px; border-radius: 50%; border: 2px solid #e0e0e0; background: transparent; }
    .odot.on { background: #ff3b30; border-color: #ff3b30; }

    /* ── Matchup ── */
    .matchup { text-align: center; font-size: 13px; color: #444; line-height: 1.5; }
    .matchup strong { color: #1c1c1e; font-weight: 600; }
    .last-play { text-align: center; font-size: 12px; color: #999; font-style: italic; margin-top: 6px; line-height: 1.4; }

    /* ── Probable pitchers ── */
    .pitchers-row { display: flex; align-items: flex-start; justify-content: space-around; }
    .pitcher-col { flex: 1; text-align: center; }
    .pitcher-team { font-size: 10px; color: #bbb; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
    .pitcher-name { font-size: 14px; font-weight: 600; color: #1c1c1e; }
    .pitcher-sub  { font-size: 11px; color: #aaa; margin-top: 2px; }
    .vs-mid { display: flex; align-items: center; font-size: 12px; color: #ddd; font-weight: 600; padding: 14px 6px 0; }

    /* ── Decisions ── */
    .decisions { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
    .dec-item { text-align: center; }
    .dec-type { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
    .dec-win  { color: #34c759; }
    .dec-loss { color: #ff3b30; }
    .dec-save { color: #ff9f0a; }
    .dec-name { font-size: 13px; font-weight: 600; color: #1c1c1e; }
    .dec-stat { font-size: 11px; color: #aaa; margin-top: 1px; }

    /* ── Line score ── */
    .ls-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .ls-table { border-collapse: collapse; font-size: 12px; min-width: 100%; white-space: nowrap; }
    .ls-table th { color: #bbb; font-weight: 600; text-align: center; padding: 3px 6px; font-size: 11px; }
    .ls-table td { text-align: center; padding: 5px 6px; color: #666; }
    .ls-table td.ls-team { font-weight: 700; color: #1c1c1e; text-align: left; padding-right: 10px; min-width: 36px; }
    .ls-table td.ls-rhe { font-weight: 700; color: #003087; border-left: 1px solid #f0f0f0; }
    .ls-table .cur { background: #eef2ff; border-radius: 4px; }

    /* ── Venue / broadcasts ── */
    .meta { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; font-size: 12px; color: #bbb; }
    .bc-pills { display: flex; gap: 5px; flex-wrap: wrap; }
    .bc-pill { background: #f5f5f7; border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 600; color: #555; }

    /* ── Season: record + streak ── */
    .record-row { display: flex; align-items: center; gap: 10px; }
    .record-big { font-size: 30px; font-weight: 800; color: #003087; }
    .streak-pill { padding: 3px 11px; border-radius: 10px; font-size: 13px; font-weight: 700; }
    .s-w { background: #e6f9ed; color: #1b7a34; }
    .s-l { background: #ffeeed; color: #c0392b; }
    .rank-tag { font-size: 13px; color: #aaa; }

    /* ── Recent results ── */
    .r10-dots { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
    .r10-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
    .r10-w { background: #e6f9ed; color: #1b7a34; }
    .r10-l { background: #ffeeed; color: #c0392b; }

    /* ── Standings ── */
    .st-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .st-table th { color: #bbb; font-size: 11px; font-weight: 600; text-align: right; padding: 3px 0; }
    .st-table th:first-child { text-align: left; }
    .st-table td { padding: 7px 0; color: #666; text-align: right; border-top: 1px solid #f5f5f5; }
    .st-table td:first-child { text-align: left; font-weight: 600; color: #1c1c1e; }
    .st-table .jays td { color: #003087; font-weight: 700; }
    .st-table .jays td:first-child { color: #003087; }

    /* ── Footer ── */
    .footer { text-align: center; padding: 4px 0 8px; }
    .refresh-btn { background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.25); padding: 10px 28px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .refresh-btn:active { background: rgba(255,255,255,.25); }
    .updated { font-size: 11px; color: rgba(255,255,255,.35); margin-top: 8px; }
    .copyright { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 11px; color: rgba(255,255,255,.3); margin-top: 8px; }
    .copyright a { color: rgba(255,255,255,.7); text-decoration: underline; text-underline-offset: 2px; }
    .copyright a:hover { color: #fff; }
    .help-btn { background: none; color: rgba(255,255,255,.4); border: 1px solid rgba(255,255,255,.2); width: 18px; height: 18px; border-radius: 50%; font-size: 10px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; padding: 0; line-height: 1; }
    .help-btn:active { color: #fff; border-color: rgba(255,255,255,.5); }

    /* ── README overlay ── */
    #readme-bd { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:300; opacity:0; pointer-events:none; transition:opacity .25s; }
    #readme-bd.open { opacity:1; pointer-events:auto; }
    #readme-sh { position:fixed; left:0; right:0; bottom:0; z-index:301; background:#fff; border-radius:20px 20px 0 0; max-height:90vh; display:flex; flex-direction:column; transform:translateY(102%); transition:transform .3s cubic-bezier(.25,.46,.45,.94); box-shadow:0 -8px 32px rgba(0,0,0,.2); }
    #readme-sh.open { transform:translateY(0); }
    .readme-head { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; border-bottom:1px solid #f0f0f0; flex-shrink:0; }
    .readme-title { font-size:15px; font-weight:700; color:#1c1c1e; }
    .readme-close { background:none; border:none; font-size:24px; color:#bbb; cursor:pointer; line-height:1; padding:0 0 2px 16px; }
    .readme-body { overflow-y:auto; flex:1; padding:16px; -webkit-overflow-scrolling:touch; line-height:1.6; font-size:13px; color:#444; }
    .readme-body h1 { font-size:18px; font-weight:800; color:#003087; margin:0 0 12px; }
    .readme-body h2 { font-size:14px; font-weight:700; color:#1c1c1e; margin:16px 0 6px; border-bottom:1px solid #f0f0f0; padding-bottom:4px; }
    .readme-body p { margin:0 0 8px; }
    .readme-body ul { padding-left:18px; margin:0 0 8px; }
    .readme-body li { margin-bottom:3px; }
    .readme-body a { color:#003087; }
    .readme-body strong { color:#1c1c1e; }
    .readme-body code { background:#f5f5f7; border-radius:4px; padding:1px 5px; font-size:12px; }

    /* ── States ── */
    .loading { color: #aaa; font-size: 14px; text-align: center; padding: 28px; }
    .err     { color: #ff3b30; font-size: 13px; text-align: center; padding: 20px; line-height: 1.5; }
    .off-msg { color: #888; font-size: 15px; text-align: center; padding: 8px 0 4px; }

    /* ── Collapsible sections ── */
    .sec-toggle-row { display:flex; align-items:center; justify-content:space-between; cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent; }
    .toggle-chev { color:#bbb; font-size:11px; transition:transform .25s; margin-left:6px; flex-shrink:0; }
    .toggle-chev.open { transform:rotate(180deg); }
    .coll-body { overflow:hidden; transition:max-height .3s ease; }

    /* ── Team toggle ── */
    .team-toggle { display:flex; gap:6px; margin-bottom:10px; }
    .team-btn { flex:1; padding:7px 0; border-radius:10px; border:none; font-size:12px; font-weight:600; cursor:pointer; background:#f0f0f5; color:#666; -webkit-tap-highlight-color:transparent; }
    .team-btn.active { background:#003087; color:#fff; }

    /* ── Player stats table ── */
    .ps-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .ps-table { border-collapse:collapse; font-size:11px; white-space:nowrap; width:100%; }
    .ps-table th { color:#bbb; font-weight:600; padding:3px 4px; text-align:right; border-bottom:1px solid #f0f0f0; font-size:10px; }
    .ps-table th:first-child { text-align:left; min-width:72px; }
    .ps-table td { padding:4px 4px; color:#666; text-align:right; border-top:1px solid #f9f9f9; }
    .ps-table td:first-child { text-align:left; color:#1c1c1e; font-weight:500; }
    .ps-total td { border-top:1px solid #e8e8e8 !important; font-weight:700; color:#333; }
    .ps-sub { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:#bbb; padding:8px 0 4px; }

    /* ── Play-by-play ── */
    .pbp-play { padding:7px 0; border-top:1px solid #f2f2f2; }
    .pbp-play:first-child { border-top:none; }
    .pbp-inn { font-size:10px; color:#bbb; font-weight:700; letter-spacing:.3px; }
    .pbp-desc { font-size:12px; color:#444; line-height:1.4; margin-top:2px; }
    .pbp-scoring .pbp-desc { color:#1b7a34; font-weight:600; }
    .pbp-hr .pbp-desc { color:#c0392b; font-weight:700; }
    .pbp-jays .pbp-inn { color:#003087; }
    .pbp-opp  .pbp-inn { color:#e04820; }
    .see-all-btn { display:block; text-align:center; color:#003087; font-size:12px; font-weight:600; padding:8px 0 2px; cursor:pointer; background:none; border:none; width:100%; -webkit-tap-highlight-color:transparent; }

    /* ── Other games card ── */
    .og-row { display:flex; align-items:center; padding:6px 0; border-top:1px solid #f2f2f2; gap:6px; width:100%; }
    .og-row:first-child { border-top:none; }
    .og-team { font-size:11px; font-weight:700; color:#1c1c1e; width:30px; flex-shrink:0; }
    .og-score { font-size:13px; font-weight:700; color:#1c1c1e; min-width:12px; text-align:center; }
    .og-dash { font-size:11px; color:#ccc; }
    .og-mid { display:flex; align-items:center; gap:4px; flex:1; }
    .og-status { margin-left:auto; font-size:10px; font-weight:700; flex-shrink:0; white-space:nowrap; }
    .og-live  { color:#ff3b30; }
    .og-final { color:#999; font-weight:600; }
    .og-pre   { color:#34c759; }

    /* ── Last 5 games list ── */
    .l5-row { display:flex; align-items:center; gap:8px; padding:9px 0; border-top:1px solid #f2f2f2; cursor:pointer; -webkit-tap-highlight-color:transparent; }
    .l5-row:first-child { border-top:none; }
    .l5-left { flex:1; min-width:0; }
    .l5-opp { font-size:13px; font-weight:600; color:#1c1c1e; }
    .l5-meta { font-size:11px; color:#aaa; margin-top:1px; }
    .l5-result { font-size:12px; font-weight:700; padding:4px 9px; border-radius:8px; flex-shrink:0; }
    .l5-w { background:#e6f9ed; color:#1b7a34; }
    .l5-l { background:#ffeeed; color:#c0392b; }
    .l5-chev { color:#ddd; font-size:16px; flex-shrink:0; }

    /* ── Filter pills ── */
    .filter-row { display:flex; gap:6px; overflow-x:auto; padding:0 0 10px; scrollbar-width:none; }
    .filter-row::-webkit-scrollbar { display:none; }
    .fpill { padding:5px 13px; border-radius:14px; font-size:12px; font-weight:600; cursor:pointer; border:none; background:#f0f0f5; color:#666; white-space:nowrap; flex-shrink:0; -webkit-tap-highlight-color:transparent; }
    .fpill.active { background:#003087; color:#fff; }

    /* ── Overlay / bottom sheet ── */
    #ov-bd { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; opacity:0; pointer-events:none; transition:opacity .25s; }
    #ov-bd.open { opacity:1; pointer-events:auto; }
    #ov-sh { position:fixed; left:0; right:0; bottom:0; z-index:201; background:#fff; border-radius:20px 20px 0 0; max-height:90vh; display:flex; flex-direction:column; transform:translateY(102%); transition:transform .3s cubic-bezier(.25,.46,.45,.94); box-shadow:0 -8px 32px rgba(0,0,0,.2); }
    #ov-sh.open { transform:translateY(0); }
    .ov-handle { width:36px; height:4px; background:#e0e0e0; border-radius:2px; margin:10px auto 0; flex-shrink:0; }
    .ov-head { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; flex-shrink:0; }
    .ov-title { font-size:15px; font-weight:700; color:#1c1c1e; }
    .ov-close { background:none; border:none; font-size:24px; color:#bbb; cursor:pointer; line-height:1; padding:0 0 2px 16px; }
    .ov-tabs { display:flex; border-bottom:1px solid #f0f0f0; flex-shrink:0; }
    .ov-tab { flex:1; padding:10px; font-size:13px; font-weight:600; background:none; border:none; cursor:pointer; color:#aaa; border-bottom:2px solid transparent; -webkit-tap-highlight-color:transparent; }
    .ov-tab.active { color:#003087; border-bottom-color:#003087; }
    .ov-body { overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }
    .ov-sec { padding:14px 16px; }
    .ov-filter-wrap { position:sticky; top:0; background:#fff; padding:8px 16px 0; border-bottom:1px solid #f0f0f0; z-index:1; }
  </style>
</head>
<body>
<div id="app">
  <header class="header">
    <img class="logo-img"
      src="https://www.mlbstatic.com/team-logos/141.svg"
      onerror="this.onerror=null;this.src='https://a.espncdn.com/i/teamlogos/mlb/500/tor.png'"
      alt="Toronto Blue Jays">
    <h1>Toronto Blue Jays</h1>
    <p class="date" id="date-label"></p>
  </header>

  <div id="game-section"><div class="card"><div class="loading">Loading…</div></div></div>
  <div id="season-section"></div>
  <div id="other-games-section"></div>
  <div id="upcoming-section"></div>

  <div class="footer">
    <button class="refresh-btn" onclick="manualRefresh()">Refresh</button>
    <p class="updated" id="updated"></p>
    <p class="copyright">
      © 2026 <a href="https://github.com/timtomnow/bluejays-score" target="_blank" rel="noopener">timtomnow</a>
      <button class="help-btn" onclick="openReadme()" aria-label="About this app">?</button>
    </p>
  </div>
</div>

<div id="readme-bd" onclick="closeReadme()"></div>
<div id="readme-sh">
  <div class="ov-handle"></div>
  <div class="readme-head">
    <div class="readme-title">About this app</div>
    <button class="readme-close" onclick="closeReadme()">&#x2715;</button>
  </div>
  <div class="readme-body" id="readme-body"><div class="loading">Loading…</div></div>
</div>

<div id="ov-bd" onclick="closeOverlay()"></div>
<div id="ov-sh">
  <div class="ov-handle"></div>
  <div class="ov-head">
    <div class="ov-title" id="ov-title">Game Details</div>
    <button class="ov-close" onclick="closeOverlay()">&#x2715;</button>
  </div>
  <div class="ov-tabs" id="ov-tabs">
    <button class="ov-tab active" id="ov-tab-stats" onclick="setOvTab('stats')">Player Stats</button>
    <button class="ov-tab" id="ov-tab-plays" onclick="setOvTab('plays')">Play-by-Play</button>
  </div>
  <div class="ov-body" id="ov-body"></div>
</div>

<script>
  const TEAM_ID     = 141;  // Toronto Blue Jays
  const DIVISION_ID = 201;  // AL East
  const LEAGUE_ID   = 103;  // American League

  // ── Helpers ──────────────────────────────────────────────────────────────

  const pad2 = n => String(n).padStart(2, '0');

  function localDate(d = new Date()) {
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  }

  function daysAgo(n) {
    const d = new Date();
    d.setDate(d.getDate() - n);
    return localDate(d);
  }

  function daysAhead(n) {
    const d = new Date();
    d.setDate(d.getDate() + n);
    return localDate(d);
  }

  function fmtTime(utc) {
    if (!utc) return '';
    return new Date(utc).toLocaleTimeString('en-CA', { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });
  }

  function abbr(team) {
    return team?.abbreviation || team?.teamName?.slice(0,3).toUpperCase() || '—';
  }

  function inningStr(ls) {
    if (!ls?.currentInning) return '';
    const arrow = ls.isTopInning ? '▲' : '▼';
    return `${arrow} ${ls.currentInningOrdinal || ls.currentInning}`;
  }

  function rankSuffix(n) {
    if (n == 1) return 'st';
    if (n == 2) return 'nd';
    if (n == 3) return 'rd';
    return 'th';
  }

  // ── API ───────────────────────────────────────────────────────────────────

  async function get(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  }

  function fetchSchedule(date) {
    return get(
      `https://statsapi.mlb.com/api/v1/schedule?sportId=1&teamId=${TEAM_ID}&date=${date}` +
      `&hydrate=linescore(offense),probablePitcher(stats),decisions,team,broadcasts(all)`
    );
  }

  function fetchStandings() {
    const yr = new Date().getFullYear();
    return get(
      `https://statsapi.mlb.com/api/v1/standings?leagueId=${LEAGUE_ID}&season=${yr}` +
      `&standingsType=regularSeason&hydrate=team,record,streak`
    );
  }

  function fetchUpcomingGames() {
    return get(
      `https://statsapi.mlb.com/api/v1/schedule?sportId=1&teamId=${TEAM_ID}` +
      `&startDate=${daysAhead(1)}&endDate=${daysAhead(45)}&gameType=R` +
      `&hydrate=team,probablePitcher`
    );
  }

  function fetchRecentGames() {
    return get(
      `https://statsapi.mlb.com/api/v1/schedule?sportId=1&teamId=${TEAM_ID}` +
      `&startDate=${daysAgo(45)}&endDate=${daysAgo(1)}&gameType=R&hydrate=team`
    );
  }

  function fetchGameFeed(pk) {
    return get(`https://statsapi.mlb.com/api/v1.1/game/${pk}/feed/live`);
  }

  function fetchAllGamesForDate(date) {
    return get(
      `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${date}` +
      `&hydrate=linescore,team`
    );
  }

  // ── SVG Diamond ──────────────────────────────────────────────────────────

  function diamond(offense) {
    const on1 = !!(offense?.first);
    const on2 = !!(offense?.second);
    const on3 = !!(offense?.third);
    const S = 72, cx = 36, cy = 36, r = 25, bs = 8;

    // [2nd, 1st, home, 3rd]
    const bases = [
      { x: cx,    y: cy-r, on: on2,  home: false },
      { x: cx+r,  y: cy,   on: on1,  home: false },
      { x: cx,    y: cy+r, on: false, home: true  },
      { x: cx-r,  y: cy,   on: on3,  home: false },
    ];

    const lines = [0,1,2,3].map(i => {
      const a = bases[i], b = bases[(i+1)%4];
      return `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="#e0e0e0" stroke-width="1.5"/>`;
    }).join('');

    const polys = bases.map(({x,y,on,home}) => {
      const fill   = home ? 'none'    : on ? '#003087' : '#ebebeb';
      const stroke = home ? '#ccc'    : on ? '#003087' : '#ccc';
      const pts = `${x},${y-bs} ${x+bs},${y} ${x},${y+bs} ${x-bs},${y}`;
      return `<polygon points="${pts}" fill="${fill}" stroke="${stroke}" stroke-width="${home ? 1.5 : 1}"/>`;
    }).join('');

    return `<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}" xmlns="http://www.w3.org/2000/svg">${lines}${polys}</svg>`;
  }

  // ── Count dots ────────────────────────────────────────────────────────────

  function countDots(balls, strikes) {
    const b = [0,1,2].map(i => `<div class="cdot${i < balls ? ' ball' : ''}"></div>`).join('');
    const s = [0,1].map(i => `<div class="cdot${i < strikes ? ' strike' : ''}"></div>`).join('');
    return `
      <div class="count-grid">
        <div class="count-row"><span class="count-lbl">B</span>${b}</div>
        <div class="count-row"><span class="count-lbl">S</span>${s}</div>
      </div>`;
  }

  function outDots(outs) {
    return `<div class="out-dots">
      ${[0,1].map(i => `<div class="odot${i < Math.min(outs,2) ? ' on' : ''}"></div>`).join('')}
    </div>`;
  }

  // ── Line score ────────────────────────────────────────────────────────────

  function lineScore(ls, awAbbr, hmAbbr, liveInning, isTopInning) {
    if (!ls?.innings?.length) return '';
    const total = Math.max(9, ls.innings.length);
    const cols  = Array.from({length: total}, (_, i) => i + 1);

    function cell(side, num) {
      const inn = ls.innings.find(x => x.num === num);
      if (!inn) return `<td>-</td>`;
      const val = inn[side]?.runs;
      const isBatting = (side === 'away' && isTopInning) || (side === 'home' && !isTopInning);
      const cur = (liveInning === num && isBatting) ? ' class="cur"' : '';
      return `<td${cur}>${val !== undefined ? val : '-'}</td>`;
    }

    const aw = ls.teams?.away  ?? {};
    const hm = ls.teams?.home  ?? {};

    return `
      <div class="ls-wrap">
        <table class="ls-table">
          <thead><tr>
            <th></th>
            ${cols.map(n => `<th>${n}</th>`).join('')}
            <th class="ls-rhe">R</th><th class="ls-rhe">H</th><th class="ls-rhe">E</th>
          </tr></thead>
          <tbody>
            <tr>
              <td class="ls-team">${awAbbr}</td>
              ${cols.map(n => cell('away', n)).join('')}
              <td class="ls-rhe">${aw.runs ?? '-'}</td>
              <td class="ls-rhe">${aw.hits ?? '-'}</td>
              <td class="ls-rhe">${aw.errors ?? '-'}</td>
            </tr>
            <tr>
              <td class="ls-team">${hmAbbr}</td>
              ${cols.map(n => cell('home', n)).join('')}
              <td class="ls-rhe">${hm.runs ?? '-'}</td>
              <td class="ls-rhe">${hm.hits ?? '-'}</td>
              <td class="ls-rhe">${hm.errors ?? '-'}</td>
            </tr>
          </tbody>
        </table>
      </div>`;
  }

  // ── Broadcasts ────────────────────────────────────────────────────────────

  function broadcasts(list) {
    if (!list?.length) return '';
    const pills = list
      .filter(b => b.type === 'TV' || b.type === 'FM')
      .slice(0, 5)
      .map(b => `<span class="bc-pill">${b.name}</span>`)
      .join('');
    return pills ? `<div class="bc-pills">${pills}</div>` : '';
  }

  // ── Pitcher stat line ─────────────────────────────────────────────────────

  function ppEra(pp) {
    if (!pp) return '';
    const s = pp.stats?.find(x => x.type?.displayName === 'statsSingleSeason');
    const era = s?.stats?.era;
    const hand = pp.pitchHand?.code ? `${pp.pitchHand.code}HP` : '';
    return [hand, era ? `${era} ERA` : ''].filter(Boolean).join(' · ');
  }

  // ── Global state ─────────────────────────────────────────────────────────
  const loadedFeeds = {};
  const gameInfoCache = {};
  const ovState = { gamePk: null, feed: null, tab: 'stats', filter: 'all', teamSide: 'away', innings: new Set() };

  // ── Collapsible toggle ────────────────────────────────────────────────────
  function toggleColl(id, rowEl) {
    const el = document.getElementById(id);
    if (!el) return;
    const chev = rowEl?.querySelector('.toggle-chev');
    const isOpen = el.style.maxHeight && el.style.maxHeight !== '0px';
    if (isOpen) {
      el.style.maxHeight = el.scrollHeight + 'px';
      requestAnimationFrame(() => { el.style.maxHeight = '0'; });
      if (chev) chev.classList.remove('open');
    } else {
      el.style.maxHeight = el.scrollHeight + 'px';
      if (chev) chev.classList.add('open');
      setTimeout(() => { if (el.style.maxHeight !== '0px') el.style.maxHeight = 'none'; }, 310);
    }
  }

  // ── Switch team stats (inline card) ───────────────────────────────────────
  function switchTeamStats(gamePk, side) {
    const aw = document.getElementById(`ps-aw-${gamePk}`);
    const hm = document.getElementById(`ps-hm-${gamePk}`);
    const awBtn = document.getElementById(`ps-btn-aw-${gamePk}`);
    const hmBtn = document.getElementById(`ps-btn-hm-${gamePk}`);
    if (aw) aw.style.display = side === 'away' ? '' : 'none';
    if (hm) hm.style.display = side === 'home' ? '' : 'none';
    if (awBtn) awBtn.classList.toggle('active', side === 'away');
    if (hmBtn) hmBtn.classList.toggle('active', side === 'home');
    // recalc collapsible height
    const coll = aw?.closest('.coll-body');
    if (coll && coll.style.maxHeight !== '0px') {
      coll.style.maxHeight = 'none';
    }
  }

  // ── Player stats renderer ─────────────────────────────────────────────────
  function renderPlayerStats(boxscore, side) {
    const team = boxscore?.teams?.[side];
    if (!team?.players) return '<div style="color:#aaa;font-size:13px;padding:8px 0">No stats available</div>';
    const players = team.players;
    const batters = (team.battingOrder ?? []).map(id => players[`ID${id}`]).filter(Boolean);
    const pitchers = (team.pitchers ?? []).map(id => players[`ID${id}`]).filter(Boolean);

    let html = '';
    if (batters.length) {
      html += `<div class="ps-wrap"><table class="ps-table">
        <thead><tr><th>Batter</th><th>AB</th><th>R</th><th>H</th><th>RBI</th><th>BB</th><th>K</th></tr></thead>
        <tbody>`;
      for (const p of batters) {
        const b = p.stats?.batting ?? {};
        const name = p.person?.fullName ?? '';
        const last = name.split(' ').slice(1).join(' ') || name;
        const pos = p.position?.abbreviation ?? '';
        html += `<tr><td>${last}<span style="color:#bbb;font-size:9px;margin-left:3px">${pos}</span></td>
          <td>${b.atBats ?? 0}</td><td>${b.runs ?? 0}</td><td>${b.hits ?? 0}</td>
          <td>${b.rbi ?? 0}</td><td>${b.baseOnBalls ?? 0}</td><td>${b.strikeOuts ?? 0}</td></tr>`;
      }
      const ts = team.teamStats?.batting;
      if (ts) {
        html += `<tr class="ps-total"><td>Total</td>
          <td>${ts.atBats ?? ''}</td><td>${ts.runs ?? ''}</td><td>${ts.hits ?? ''}</td>
          <td>${ts.rbi ?? ''}</td><td>${ts.baseOnBalls ?? ''}</td><td>${ts.strikeOuts ?? ''}</td></tr>`;
      }
      html += '</tbody></table></div>';
    }
    if (pitchers.length) {
      html += `<div class="ps-sub">Pitching</div>
        <div class="ps-wrap"><table class="ps-table">
          <thead><tr><th>Pitcher</th><th>IP</th><th>H</th><th>ER</th><th>BB</th><th>K</th><th>PC</th></tr></thead>
          <tbody>`;
      for (const p of pitchers) {
        const pit = p.stats?.pitching ?? {};
        if (!pit.inningsPitched) continue;
        const name = p.person?.fullName ?? '';
        const last = name.split(' ').slice(1).join(' ') || name;
        html += `<tr><td>${last}</td><td>${pit.inningsPitched}</td><td>${pit.hits ?? 0}</td>
          <td>${pit.earnedRuns ?? 0}</td><td>${pit.baseOnBalls ?? 0}</td><td>${pit.strikeOuts ?? 0}</td>
          <td>${pit.numberOfPitches ?? 0}</td></tr>`;
      }
      html += '</tbody></table></div>';
    }
    return html || '<div style="color:#aaa;font-size:13px;padding:8px 0">No stats available</div>';
  }

  // ── Play renderer (shared by inline + overlay) ────────────────────────────
  function renderPlays(allPlays, limit, filter, innings, jaysAway) {
    if (!allPlays?.length) return '<div style="color:#aaa;font-size:13px;padding:12px 0;text-align:center">No plays yet</div>';
    let plays = allPlays.filter(p => p?.about?.isComplete);
    if (filter === 'hits')       plays = plays.filter(p => ['single','double','triple','home_run'].includes(p.result?.eventType));
    else if (filter === 'ks')    plays = plays.filter(p => p.result?.eventType === 'strikeout');
    else if (filter === 'walks') plays = plays.filter(p => ['walk','intent_walk'].includes(p.result?.eventType));
    else if (filter === 'runs')  plays = plays.filter(p => p.about?.isScoringPlay);
    if (innings?.size) plays = plays.filter(p => innings.has(p.about?.inning));
    if (!plays.length) return '<div style="color:#aaa;font-size:13px;padding:12px 0;text-align:center">No plays match this filter</div>';
    const slice = limit ? plays.slice(-limit) : plays;
    return [...slice].reverse().map(p => {
      const half = p.about?.halfInning === 'top' ? '▲' : '▼';
      const inn = p.about?.inning ?? '';
      const isHR = p.result?.eventType === 'home_run';
      const isScore = p.about?.isScoringPlay;
      const cls = isHR ? ' pbp-hr' : isScore ? ' pbp-scoring' : '';
      let teamCls = '';
      if (jaysAway !== undefined) {
        const jaysAreTop = jaysAway;
        const jaysAreBatting = (p.about?.halfInning === 'top') === jaysAreTop;
        teamCls = jaysAreBatting ? ' pbp-jays' : ' pbp-opp';
      }
      return `<div class="pbp-play${cls}${teamCls}">
        <div class="pbp-inn">${half}&nbsp;${inn}</div>
        <div class="pbp-desc">${p.result?.description ?? ''}</div>
      </div>`;
    }).join('');
  }

  // ── Overlay ───────────────────────────────────────────────────────────────
  async function openGameOverlay(gamePk, tab) {
    ovState.gamePk = gamePk;
    ovState.tab = tab || 'stats';
    ovState.filter = 'all';
    ovState.teamSide = 'away';
    ovState.innings = new Set();

    const info = gameInfoCache[gamePk];
    document.getElementById('ov-title').textContent = info?.title ?? 'Game Details';
    document.getElementById('ov-body').innerHTML = '<div class="loading" style="padding:40px">Loading…</div>';

    document.getElementById('ov-bd').classList.add('open');
    document.getElementById('ov-sh').classList.add('open');
    document.body.style.overflow = 'hidden';

    if (!loadedFeeds[gamePk]) {
      try { loadedFeeds[gamePk] = await fetchGameFeed(gamePk); }
      catch(e) {
        document.getElementById('ov-body').innerHTML = `<div class="err" style="padding:20px">Could not load game data.<br>${e.message}</div>`;
        return;
      }
    }
    ovState.feed = loadedFeeds[gamePk];
    renderOvContent();
  }

  function closeOverlay() {
    document.getElementById('ov-bd').classList.remove('open');
    document.getElementById('ov-sh').classList.remove('open');
    document.body.style.overflow = '';
  }

  function setOvTab(tab) {
    ovState.tab = tab;
    renderOvContent();
  }

  function setOvFilter(filter) {
    ovState.filter = filter;
    renderOvContent();
  }

  function setOvInning(inn) {
    if (ovState.innings.has(inn)) ovState.innings.delete(inn);
    else ovState.innings.add(inn);
    renderOvContent();
  }

  function setOvTeam(side) {
    ovState.teamSide = side;
    renderOvContent();
  }

  function renderOvContent() {
    // Update tab buttons
    document.getElementById('ov-tab-stats').classList.toggle('active', ovState.tab === 'stats');
    document.getElementById('ov-tab-plays').classList.toggle('active', ovState.tab === 'plays');

    const feed = ovState.feed;
    const boxscore = feed?.liveData?.boxscore;
    const allPlays = feed?.liveData?.plays?.allPlays ?? [];

    let html = '';
    if (ovState.tab === 'stats') {
      const awAb = abbr(feed?.gameData?.teams?.away) || 'Away';
      const hmAb = abbr(feed?.gameData?.teams?.home) || 'Home';
      html = `<div class="ov-sec">
        <div class="team-toggle">
          <button class="team-btn ${ovState.teamSide === 'away' ? 'active' : ''}" onclick="setOvTeam('away')">${awAb}</button>
          <button class="team-btn ${ovState.teamSide === 'home' ? 'active' : ''}" onclick="setOvTeam('home')">${hmAb}</button>
        </div>
        ${renderPlayerStats(boxscore, ovState.teamSide)}
      </div>`;
    } else {
      const filters = [
        { id:'all', label:'All' },
        { id:'hits', label:'Hits' },
        { id:'ks', label:'Strikeouts' },
        { id:'walks', label:'Walks' },
        { id:'runs', label:'Scoring' },
      ];
      const typePills = filters.map(f =>
        `<button class="fpill ${f.id === ovState.filter ? 'active' : ''}" onclick="setOvFilter('${f.id}')">${f.label}</button>`
      ).join('');

      // Build inning pills from available innings in completed plays
      const completedPlays = allPlays.filter(p => p?.about?.isComplete);
      const availableInnings = [...new Set(completedPlays.map(p => p.about?.inning).filter(Boolean))].sort((a,b) => a-b);
      const inningPills = availableInnings.map(inn =>
        `<button class="fpill ${ovState.innings.has(inn) ? 'active' : ''}" onclick="setOvInning(${inn})">${inn}</button>`
      ).join('');

      html = `<div class="ov-filter-wrap">
          <div class="filter-row" style="padding-bottom:6px">${typePills}</div>
          ${inningPills ? `<div style="display:flex;align-items:center;gap:6px;padding-bottom:10px">
            <span style="font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0">Inn</span>
            <div class="filter-row" style="padding:0">${inningPills}</div>
          </div>` : ''}
        </div>
        <div class="ov-sec">${renderPlays(allPlays, 0, ovState.filter, ovState.innings, feed?.gameData?.teams?.away?.id === TEAM_ID)}</div>`;
    }
    document.getElementById('ov-body').innerHTML = html;
  }

  // ── Game card ─────────────────────────────────────────────────────────────

  function renderGame(g, feed) {
    const state  = g.status?.abstractGameState;
    const detail = g.status?.detailedState ?? state ?? '—';

    const aw = g.teams?.away;
    const hm = g.teams?.home;
    const awAbbr = abbr(aw?.team);
    const hmAbbr = abbr(hm?.team);
    const awName = aw?.team?.teamName ?? 'Away';
    const hmName = hm?.team?.teamName ?? 'Home';
    const awRec  = aw?.leagueRecord ? `${aw.leagueRecord.wins}–${aw.leagueRecord.losses}` : '';
    const hmRec  = hm?.leagueRecord ? `${hm.leagueRecord.wins}–${hm.leagueRecord.losses}` : '';

    const isPreview = state === 'Preview';
    const isLive    = state === 'Live';
    const isFinal   = state === 'Final';

    const awScore = isPreview ? '—' : (aw?.score ?? '0');
    const hmScore = isPreview ? '—' : (hm?.score ?? '0');

    const jaysAway = aw?.team?.id === TEAM_ID;
    const awWon = isFinal && aw?.score > hm?.score;
    const hmWon = isFinal && hm?.score > aw?.score;

    let badgeCls = 'b-off', badgeTxt = detail;
    if (isLive)    { badgeCls = 'b-live';    badgeTxt = 'Live'; }
    if (isFinal)   { badgeCls = 'b-final'; }
    if (isPreview) { badgeCls = 'b-preview'; }

    const ls = g.linescore;

    // Prefer live feed linescore for count/runners (more real-time)
    const fls     = feed?.liveData?.linescore ?? ls;
    const outs    = fls?.outs    ?? 0;
    // At 3 outs the half-inning is over — clear count and bases
    const inningOver = outs >= 3;
    const offense = inningOver ? null : (fls?.offense ?? ls?.offense);
    const balls   = inningOver ? 0 : (fls?.balls   ?? 0);
    const strikes = inningOver ? 0 : (fls?.strikes ?? 0);

    // ── Score header ──
    let html = `<div class="sec">
      <div class="score-header">
        <span class="badge ${badgeCls}">${badgeTxt}</span>
        ${isLive    ? `<span style="font-size:13px;color:#888;font-weight:600">${inningStr(fls || ls)}</span>` : ''}
        ${isPreview ? `<span style="font-size:13px;font-weight:600;color:#333">${fmtTime(g.gameDate)}</span>` : ''}
      </div>
      <div class="score-row">
        <div class="team-col">
          <div class="team-abbr">${awAbbr}</div>
          <div class="score-num ${isFinal && awWon ? 'hi' : isFinal && !awWon ? 'dim' : ''}">${awScore}</div>
          <div class="team-record">${awRec}</div>
        </div>
        ${isPreview
          ? `<span class="score-vs">vs</span>`
          : `<span class="score-dash">–</span>`}
        <div class="team-col">
          <div class="team-abbr">${hmAbbr}</div>
          <div class="score-num ${isFinal && hmWon ? 'hi' : isFinal && !hmWon ? 'dim' : ''}">${hmScore}</div>
          <div class="team-record">${hmRec}</div>
        </div>
      </div>
    </div>`;

    // ── Live: situation (count / bases / outs) ──
    if (isLive) {
      html += `<div class="sec">
        <div class="situation">
          <div class="sit-col">
            ${countDots(balls, strikes)}
            <span class="sit-label">Count</span>
          </div>
          <div class="sit-col">
            ${diamond(offense)}
            <span class="sit-label">Bases</span>
          </div>
          <div class="sit-col">
            ${outDots(outs)}
            <span class="sit-label">${outs === 1 ? '1 out' : `${outs} outs`}</span>
          </div>
        </div>
      </div>`;

      // Current batter vs pitcher from feed
      const cp = feed?.liveData?.plays?.currentPlay;
      if (cp) {
        const batter  = cp.matchup?.batter?.fullName;
        const pitcher = cp.matchup?.pitcher?.fullName;
        const batHand = cp.matchup?.batSide?.code;
        const pitHand = cp.matchup?.pitchHand?.code;
        const lastDesc = cp.result?.description;

        if (batter || pitcher) {
          const isTop = fls?.isTopInning ?? true;
          const jaysColor = '#003087';
          const oppColor  = '#c0392b';
          const awayColor = jaysAway ? jaysColor : oppColor;
          const homeColor = jaysAway ? oppColor  : jaysColor;
          // Away always on left, home always on right; role flips by half-inning
          const awayName = isTop ? batter  : pitcher;
          const awayHand = isTop ? (batHand ? `${batHand}HB` : '') : (pitHand ? `${pitHand}HP` : '');
          const awayRole = isTop ? 'Batting' : 'Pitching';
          const homeName = isTop ? pitcher : batter;
          const homeHand = isTop ? (pitHand ? `${pitHand}HP` : '') : (batHand ? `${batHand}HB` : '');
          const homeRole = isTop ? 'Pitching' : 'Batting';
          html += `<div class="sec">
            <div style="display:flex;align-items:flex-start;gap:4px">
              <div style="flex:1;text-align:left">
                <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#bbb;margin-bottom:2px">${awAbbr}</div>
                <div style="font-size:13px;font-weight:600;color:${awayColor}">${awayName ?? '—'}${awayHand ? `<span style="font-size:10px;color:#aaa;font-weight:400"> (${awayHand})</span>` : ''}</div>
                <div style="font-size:10px;color:#aaa;margin-top:1px">${awayRole}</div>
              </div>
              <div style="font-size:11px;color:#ddd;padding:14px 4px 0">vs</div>
              <div style="flex:1;text-align:right">
                <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#bbb;margin-bottom:2px">${hmAbbr}</div>
                <div style="font-size:13px;font-weight:600;color:${homeColor}">${homeName ?? '—'}${homeHand ? `<span style="font-size:10px;color:#aaa;font-weight:400"> (${homeHand})</span>` : ''}</div>
                <div style="font-size:10px;color:#aaa;margin-top:1px">${homeRole}</div>
              </div>
            </div>
            ${lastDesc ? `<div class="last-play">${lastDesc}</div>` : ''}
          </div>`;
        }
      }
    }

    // ── Preview: probable starters ──
    if (isPreview) {
      const awPP = aw?.probablePitcher;
      const hmPP = hm?.probablePitcher;
      if (awPP || hmPP) {
        html += `<div class="sec">
          <div class="sec-title">Probable Starters</div>
          <div class="pitchers-row">
            <div class="pitcher-col">
              <div class="pitcher-team">${awAbbr}</div>
              <div class="pitcher-name">${awPP?.fullName ?? 'TBD'}</div>
              <div class="pitcher-sub">${ppEra(awPP)}</div>
            </div>
            <div class="vs-mid">vs</div>
            <div class="pitcher-col">
              <div class="pitcher-team">${hmAbbr}</div>
              <div class="pitcher-name">${hmPP?.fullName ?? 'TBD'}</div>
              <div class="pitcher-sub">${ppEra(hmPP)}</div>
            </div>
          </div>
        </div>`;
      }
    }

    // ── Final: decisions (W / L / SV) ──
    if (isFinal && g.decisions) {
      const { winner, loser, save } = g.decisions;
      if (winner || loser || save) {
        const items = [
          winner && `<div class="dec-item"><div class="dec-type dec-win">Win</div><div class="dec-name">${winner.fullName}</div></div>`,
          loser  && `<div class="dec-item"><div class="dec-type dec-loss">Loss</div><div class="dec-name">${loser.fullName}</div></div>`,
          save   && `<div class="dec-item"><div class="dec-type dec-save">Save</div><div class="dec-name">${save.fullName}</div></div>`,
        ].filter(Boolean).join('');
        html += `<div class="sec"><div class="decisions">${items}</div></div>`;
      }
    }

    // ── Line score (live + final) ──
    if ((isLive || isFinal) && ls?.innings?.length) {
      const liveInn = isLive ? (fls?.currentInning ?? ls.currentInning) : null;
      const isTopInn = fls?.isTopInning ?? false;
      html += `<div class="sec">
        <div class="sec-title">Line Score</div>
        ${lineScore(ls, awAbbr, hmAbbr, liveInn, isTopInn)}
      </div>`;
    }

    // ── Player stats (live + final) ──
    if ((isLive || isFinal) && feed?.liveData?.boxscore) {
      const bs = feed.liveData.boxscore;
      const awAb2 = awAbbr;
      const hmAb2 = hmAbbr;
      const collId = `coll-ps-${g.gamePk}`;
      html += `<div class="sec">
        <div class="sec-toggle-row" onclick="toggleColl('${collId}', this)">
          <span class="sec-title" style="margin-bottom:0">Player Stats</span>
          <span class="toggle-chev">▼</span>
        </div>
        <div id="${collId}" class="coll-body" style="max-height:0">
          <div style="padding-top:10px;padding-bottom:4px">
            <div class="team-toggle">
              <button class="team-btn active" id="ps-btn-aw-${g.gamePk}" onclick="switchTeamStats(${g.gamePk},'away')">${awAb2}</button>
              <button class="team-btn" id="ps-btn-hm-${g.gamePk}" onclick="switchTeamStats(${g.gamePk},'home')">${hmAb2}</button>
            </div>
            <div id="ps-aw-${g.gamePk}">${renderPlayerStats(bs, 'away')}</div>
            <div id="ps-hm-${g.gamePk}" style="display:none">${renderPlayerStats(bs, 'home')}</div>
          </div>
        </div>
      </div>`;
    }

    // ── Play-by-play (live: last 5 inline + see all; final: link only) ──
    if (isLive && feed?.liveData?.plays?.allPlays?.length) {
      const collId2 = `coll-pbp-${g.gamePk}`;
      html += `<div class="sec">
        <div class="sec-toggle-row" onclick="toggleColl('${collId2}', this)">
          <span class="sec-title" style="margin-bottom:0">Recent Plays</span>
          <span class="toggle-chev">▼</span>
        </div>
        <div id="${collId2}" class="coll-body" style="max-height:0">
          <div style="padding-top:4px">
            ${renderPlays(feed.liveData.plays.allPlays, 5, 'all', null, jaysAway)}
            <button class="see-all-btn" onclick="openGameOverlay(${g.gamePk},'plays')">See all plays →</button>
          </div>
        </div>
      </div>`;
    } else if (isFinal && feed?.liveData?.plays?.allPlays?.length) {
      html += `<div class="sec">
        <button class="see-all-btn" onclick="openGameOverlay(${g.gamePk},'plays')">View Play-by-Play →</button>
      </div>`;
    }

    // ── Venue + broadcasts ──
    const venue = g.venue?.name;
    const bcHtml = broadcasts(g.broadcasts);
    if (venue || bcHtml) {
      html += `<div class="sec">
        <div class="meta">
          <span>${venue ?? ''}</span>
          ${bcHtml}
        </div>
      </div>`;
    }

    return `<div class="card">${html}</div>`;
  }

  // ── Season card ───────────────────────────────────────────────────────────

  function renderSeason(standings) {
    let jaysRec = null;
    let divRows = [];

    if (standings?.records) {
      const east = standings.records.find(r => r.division?.id === DIVISION_ID);
      if (east) {
        divRows = (east.teamRecords ?? []).slice().sort((a,b) => +a.divisionRank - +b.divisionRank);
        jaysRec = divRows.find(r => r.team?.id === TEAM_ID);
      }
    }

    let html = '';

    if (jaysRec) {
      const streak = jaysRec.streak?.streakCode ?? '';
      const sCls   = streak.startsWith('W') ? 's-w' : 's-l';
      const rank   = jaysRec.divisionRank;
      html += `<div class="sec">
        <div class="sec-title">${new Date().getFullYear()} Season</div>
        <div class="record-row">
          <span class="record-big">${jaysRec.wins}–${jaysRec.losses}</span>
          ${streak ? `<span class="streak-pill ${sCls}">${streak}</span>` : ''}
          <span class="rank-tag">${rank}${rankSuffix(rank)} AL East · ${jaysRec.winningPercentage ?? ''}</span>
        </div>
      </div>`;
    }

    if (divRows.length) {
      const rows = divRows.map(r => {
        const gb  = r.gamesBack === '-' ? '—' : (r.gamesBack ?? '—');
        const str = r.streak?.streakCode ?? '';
        const cls = r.team?.id === TEAM_ID ? ' class="jays"' : '';
        return `<tr${cls}>
          <td>${r.team?.teamName ?? r.team?.name}</td>
          <td>${r.wins}</td>
          <td>${r.losses}</td>
          <td>${gb}</td>
          <td>${str}</td>
        </tr>`;
      }).join('');
      html += `<div class="sec">
        <div class="sec-title">AL East</div>
        <table class="st-table">
          <thead><tr><th>Team</th><th>W</th><th>L</th><th>GB</th><th>Str</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }

    return html ? `<div class="card">${html}</div>` : '';
  }

  // ── Bottom card: Last 5 + Upcoming ───────────────────────────────────────

  function renderBottomCard(recentData, upcomingData) {
    // ── Parse last 5 completed games ──
    const completed = [];
    for (const d of recentData?.dates ?? []) {
      for (const g of d.games ?? []) {
        if (g.status?.abstractGameState !== 'Final') continue;
        const aw = g.teams?.away, hm = g.teams?.home;
        const jAway = aw?.team?.id === TEAM_ID;
        const jScore = jAway ? aw?.score : hm?.score;
        const oScore = jAway ? hm?.score : aw?.score;
        if (jScore !== undefined && oScore !== undefined) {
          completed.push({
            win: jScore > oScore, date: d.date, gamePk: g.gamePk,
            jScore, oScore, jaysAway: jAway,
            awTeam: aw?.team, hmTeam: hm?.team,
          });
        }
      }
    }
    completed.sort((a,b) => a.date < b.date ? -1 : 1);
    const last5 = completed.slice(-5);

    // Store in cache for overlay use
    for (const gm of last5) {
      const oppTeam = gm.jaysAway ? gm.hmTeam : gm.awTeam;
      const oppAb = abbr(oppTeam);
      const d = new Date(gm.date + 'T12:00:00');
      const dateStr = d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric' });
      gameInfoCache[gm.gamePk] = {
        title: `${gm.jaysAway ? 'TOR @ ' + oppAb : oppAb + ' @ TOR'} · ${dateStr}`,
      };
    }

    let html = '';

    // ── Last 5 games section ──
    if (last5.length) {
      const rows = [...last5].reverse().map(gm => {
        const oppTeam = gm.jaysAway ? gm.hmTeam : gm.awTeam;
        const ha = gm.jaysAway ? '@ ' : 'vs ';
        const oppName = oppTeam?.teamName ?? oppTeam?.name ?? '—';
        const d = new Date(gm.date + 'T12:00:00');
        const dateStr = d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric' });
        const resCls = gm.win ? 'l5-w' : 'l5-l';
        const resLabel = `${gm.win ? 'W' : 'L'} ${gm.jScore}–${gm.oScore}`;
        return `<div class="l5-row" onclick="openGameOverlay(${gm.gamePk},'stats')">
          <div class="l5-left">
            <div class="l5-opp">${ha}${oppName}</div>
            <div class="l5-meta">${dateStr}</div>
          </div>
          <div class="l5-result ${resCls}">${resLabel}</div>
          <span class="l5-chev">›</span>
        </div>`;
      }).join('');
      html += `<div class="sec">
        <div class="sec-title">Last 5 Games</div>
        ${rows}
      </div>`;
    }

    // ── Upcoming games section ──
    const upcoming = [];
    for (const d of upcomingData?.dates ?? []) {
      for (const g of d.games ?? []) {
        upcoming.push({ date: d.date, game: g });
        if (upcoming.length >= 3) break;
      }
      if (upcoming.length >= 3) break;
    }

    if (upcoming.length) {
      const upRows = upcoming.map(({ date, game }) => {
        const aw = game.teams?.away;
        const hm = game.teams?.home;
        const jaysAway = aw?.team?.id === TEAM_ID;
        const opp = jaysAway ? hm?.team : aw?.team;
        const ha  = jaysAway ? '@ ' : 'vs ';
        const oppName = opp?.teamName ?? opp?.name ?? '—';
        const d = new Date(date + 'T12:00:00');
        const dateStr = d.toLocaleDateString('en-CA', { weekday: 'short', month: 'short', day: 'numeric' });
        const timeStr = fmtTime(game.gameDate);
        const awPP = aw?.probablePitcher?.fullName;
        const hmPP = hm?.probablePitcher?.fullName;
        const jaysPP = jaysAway ? awPP : hmPP;
        const oppPP  = jaysAway ? hmPP : awPP;
        return `<div class="sec">
          <div style="font-size:13px;font-weight:700;color:#1c1c1e">${ha}${oppName}</div>
          <div style="font-size:11px;color:#aaa;margin-top:2px">${dateStr}${timeStr ? ' · ' + timeStr : ''}</div>
          ${(jaysPP || oppPP) ? `<div style="font-size:11px;color:#bbb;margin-top:3px">
            ${jaysPP ? `TOR: ${jaysPP}` : ''}${jaysPP && oppPP ? '&nbsp;·&nbsp;' : ''}${oppPP ? `${abbr(opp)}: ${oppPP}` : ''}
          </div>` : ''}
        </div>`;
      }).join('');
      html += `<div class="sec" style="padding-bottom:4px"><div class="sec-title">Upcoming Games</div></div>${upRows}`;
    }

    return html ? `<div class="card">${html}</div>` : '';
  }

  // ── Other MLB Games Today ────────────────────────────────────────────────

  function renderOtherGames(allGamesData) {
    const games = allGamesData?.dates?.[0]?.games ?? [];
    const others = games.filter(g =>
      g.teams?.away?.team?.id !== TEAM_ID &&
      g.teams?.home?.team?.id !== TEAM_ID
    );
    if (!others.length) return '';

    const stateOrder = { Live: 0, Final: 1, Preview: 2 };
    others.sort((a, b) => {
      const ao = stateOrder[a.status?.abstractGameState] ?? 3;
      const bo = stateOrder[b.status?.abstractGameState] ?? 3;
      return ao !== bo ? ao - bo : (a.gameDate ?? '').localeCompare(b.gameDate ?? '');
    });

    const rows = others.map(g => {
      const state = g.status?.abstractGameState;
      const aw = g.teams?.away;
      const hm = g.teams?.home;
      const awAb = abbr(aw?.team);
      const hmAb = abbr(hm?.team);
      const isLiveG   = state === 'Live';
      const isFinalG  = state === 'Final';
      const isPreviewG = !isLiveG && !isFinalG;

      let statusHtml;
      if (isLiveG) {
        const inn = inningStr(g.linescore);
        statusHtml = `<span class="og-status og-live">${inn || 'Live'}</span>`;
      } else if (isFinalG) {
        statusHtml = `<span class="og-status og-final">Final</span>`;
      } else {
        statusHtml = `<span class="og-status og-pre">${fmtTime(g.gameDate)}</span>`;
      }

      const showScore = isLiveG || isFinalG;
      return `<div class="og-row">
        <div class="og-row" style="width:50%">
          <span class="og-team">${awAb}</span>
          ${showScore ? `<span class="og-score">${aw?.score ?? 0}</span><span class="og-dash">–</span><span class="og-score">${hm?.score ?? 0}</span>` : '<span class="og-dash" style="flex:0.3;text-align:center">@</span>'}
          <span class="og-team">${hmAb}</span>
        </div>
        <div style="width:50%; text-align:right"><span style="text-align:right">${statusHtml}</span></div>
      </div>`;
    }).join('');

    const collId = 'coll-other-games';
    return `<div class="card"><div class="sec">
      <div class="sec-toggle-row" onclick="toggleColl('${collId}', this)">
        <span class="sec-title" style="margin-bottom:0">Other MLB Games Today</span>
        <span class="toggle-chev">▼</span>
      </div>
      <div id="${collId}" class="coll-body" style="max-height:0">
        <div style="padding-top:4px">${rows}</div>
      </div>
    </div></div>`;
  }

  // ── Collapsible state helpers (for refresh preservation) ──────────────────

  function getExpandedSections() {
    return Array.from(document.querySelectorAll('.coll-body'))
      .filter(el => el.style.maxHeight && el.style.maxHeight !== '0px')
      .map(el => el.id)
      .filter(Boolean);
  }

  function restoreExpandedSections(ids) {
    for (const id of ids) {
      const el = document.getElementById(id);
      if (!el) continue;
      el.style.maxHeight = 'none';
      const rowEl = el.previousElementSibling;
      const chev = rowEl?.querySelector?.('.toggle-chev');
      if (chev) chev.classList.add('open');
    }
  }

  async function manualRefresh() {
    const expanded = getExpandedSections();
    await load();
    restoreExpandedSections(expanded);
  }

  // ── Main load ─────────────────────────────────────────────────────────────

  async function load() {
    const gameEl   = document.getElementById('game-section');
    const seasonEl = document.getElementById('season-section');
    gameEl.innerHTML = '<div class="card"><div class="loading">Loading…</div></div>';

    document.getElementById('date-label').textContent = new Date().toLocaleDateString('en-CA', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    try {
      const [scheduleData, standingsData, recentData, upcomingData, allGamesData] = await Promise.all([
        fetchSchedule(localDate()),
        fetchStandings().catch(() => null),
        fetchRecentGames().catch(() => null),
        fetchUpcomingGames().catch(() => null),
        fetchAllGamesForDate(localDate()).catch(() => null),
      ]);

      const games = scheduleData.dates?.[0]?.games ?? [];

      // Fetch feeds for live and final games (need boxscore + plays)
      const feedGames = games.filter(g => ['Live','Final'].includes(g.status?.abstractGameState));
      const feedResults = await Promise.all(feedGames.map(g => fetchGameFeed(g.gamePk).catch(() => null)));
      feedGames.forEach((g, i) => { if (feedResults[i]) loadedFeeds[g.gamePk] = feedResults[i]; });
      const feedMap = Object.fromEntries(feedGames.map((g, i) => [g.gamePk, feedResults[i]]));

      if (!games.length) {
        gameEl.innerHTML = `<div class="card">
          <div class="sec">
            <span class="badge b-off">Off Day</span>
            <div class="off-msg">No game today. Rest up, Blue Jays.</div>
          </div>
        </div>`;
      } else {
        gameEl.innerHTML = games.map(g => renderGame(g, feedMap[g.gamePk] ?? null)).join('');
      }

      seasonEl.innerHTML = renderSeason(standingsData);
      document.getElementById('other-games-section').innerHTML = renderOtherGames(allGamesData);
      document.getElementById('upcoming-section').innerHTML = renderBottomCard(recentData, upcomingData);

      document.getElementById('updated').textContent =
        'Updated at ' + new Date().toLocaleTimeString('en-CA', { hour: 'numeric', minute: '2-digit' });

    } catch (e) {
      gameEl.innerHTML = `<div class="card"><div class="err">Could not load data.<br>${e.message}</div></div>`;
    }
  }

  // ── README overlay ────────────────────────────────────────────────────────

  function githubRawUrl() {
    const { hostname, pathname } = window.location;
    if (hostname.endsWith('.github.io')) {
      const user = hostname.replace('.github.io', '');
      const repo = pathname.split('/').filter(Boolean)[0] ?? '';
      if (repo) return `https://raw.githubusercontent.com/${user}/${repo}/main/README.md`;
    }
    return null;
  }

  function parseMarkdown(md) {
    return md
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>[\s\S]*?<\/li>)(\n(?!<li>))/g, '<ul>$1</ul>\n')
      .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
      .replace(/\n\n+/g, '</p><p>')
      .replace(/^(?!<[hup])/gm, '')
      .replace(/<\/ul><ul>/g, '')
      .replace(/(<p>|<\/p>)+/g, m => m.length > 4 ? '<p>' : m);
  }

  async function openReadme() {
    document.getElementById('readme-bd').classList.add('open');
    document.getElementById('readme-sh').classList.add('open');
    document.body.style.overflow = 'hidden';
    const bodyEl = document.getElementById('readme-body');
    bodyEl.innerHTML = '<div class="loading">Loading…</div>';
    try {
      let md = null;
      // Try relative path first (works on any proper web server)
      try {
        const r = await fetch('./README.md');
        if (r.ok) md = await r.text();
      } catch(_) {}
      // Fall back to raw GitHub URL (handles file:// and other edge cases)
      if (!md) {
        const fallback = githubRawUrl();
        if (!fallback) throw new Error('README could not be loaded');
        const r = await fetch(fallback);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        md = await r.text();
      }
      bodyEl.innerHTML = parseMarkdown(md);
    } catch(e) {
      bodyEl.innerHTML = `<div class="err">Could not load README.<br>${e.message}</div>`;
    }
  }

  function closeReadme() {
    document.getElementById('readme-bd').classList.remove('open');
    document.getElementById('readme-sh').classList.remove('open');
    document.body.style.overflow = '';
  }

  // Self-rescheduling refresh: 30 s live, 60 s scheduled, 5 min off-day
  function scheduleRefresh() {
    const isLive    = !!document.querySelector('.b-live');
    const isPreview = !!document.querySelector('.b-preview');
    const delay = isLive ? 30_000 : isPreview ? 60_000 : 300_000;
    setTimeout(async () => {
      const expanded = getExpandedSections();
      await load();
      restoreExpandedSections(expanded);
      scheduleRefresh();
    }, delay);
  }
  scheduleRefresh();

  load();
</script>
